name: prynova_mobile
description: "Member-facing Flutter app for the multi-tenant Prynova Church Management System."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^16.2.1
  google_fonts: ^6.3.0
  pinput: ^5.0.1
  supabase_flutter: ^2.10.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  infinite_scroll_pagination: ^5.1.1
  image_gallery_saver: ^2.0.3
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^17.0.0
  timeago: ^3.6.0
  mobile_scanner: ^5.1.0
  screen_brightness: ^0.2.2
  lottie: ^3.1.0
  table_calendar: ^3.1.0
  wakelock_plus: ^1.2.0
  auto_size_text: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/fonts/
